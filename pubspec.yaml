name: agro_ai_doctor
description: "AI-powered mobile app for Nigerian farmers to detect crop diseases."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  
  # Backend
  supabase_flutter: ^2.5.0
  
  # Networking
  dio: ^5.4.3
  tflite_flutter: ^0.12.1
  
  # Image & Media
  camera: ^0.11.0+2
  image: ^4.8.0
  image_picker: ^1.1.2
  path_provider: ^2.1.3
  path: ^1.9.0
  
  # UI & UX
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  flutter_tts: ^4.0.2
  
  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/aiLogo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/lang/
    - assets/models/
